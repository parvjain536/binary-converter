<!DOCTYPE html>
<html>
<head>
    <title>Binary Converter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Number System Converter</h1>

    <form method="POST">
        <input type="text" name="value" placeholder="Enter value" required>

        <select name="type">
            <option value="dec_to_bin">Decimal → Binary</option>
            <option value="bin_to_dec">Binary → Decimal</option>
            <option value="dec_to_hex">Decimal → Hex</option>
            <option value="hex_to_dec">Hex → Decimal</option>
            <option value="bin_to_hex">Binary → Hex</option>
            <option value="hex_to_bin">Hex → Binary</option>
        </select>

        <button type="submit">Convert</button>
    </form>

    {% if result is not none %}
        <div class="result">Result: {{ result }}</div>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
